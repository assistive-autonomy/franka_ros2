# MoveIt uses this configuration for controller management

moveit_controller_manager: moveit_simple_controller_manager/MoveItSimpleControllerManager

moveit_simple_controller_manager:
  controller_names:
    - left_fr3v2_controller
    - right_fr3v2_controller
    - left_hand_controller
    - right_hand_controller

  left_fr3v2_controller:
    type: FollowJointTrajectory
    joints:
      - left_fr3v2_joint1
      - left_fr3v2_joint2
      - left_fr3v2_joint3
      - left_fr3v2_joint4
      - left_fr3v2_joint5
      - left_fr3v2_joint6
      - left_fr3v2_joint7
    action_ns: follow_joint_trajectory
    default: true
  right_fr3v2_controller:
    type: FollowJointTrajectory
    joints:
      - right_fr3v2_joint1
      - right_fr3v2_joint2
      - right_fr3v2_joint3
      - right_fr3v2_joint4
      - right_fr3v2_joint5
      - right_fr3v2_joint6
      - right_fr3v2_joint7
    action_ns: follow_joint_trajectory
    default: true
  left_hand_controller:
    type: GripperCommand
    joints: 
      - left_fr3v2_finger_joint1
      - left_fr3v2_finger_joint2
    action_ns: gripper_cmd
    default: true
  right_hand_controller:
    type: GripperCommand
    joints: 
      - right_fr3v2_finger_joint1
      - right_fr3v2_finger_joint2
    action_ns: gripper_cmd
    default: true